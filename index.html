<!DOCTYPE html>
<html lang="it-IT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#b42318">
  <meta name="description" content="Itinerario del viaggio in Corea del Sud dal 26 luglio al 13 agosto 2026.">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
  <title>Corea 2026 — Itinerario</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
  <a class="skip-link" href="#main">Salta al contenuto</a>

  <header class="site-header" role="banner">
    <div class="site-header__inner">
      <div class="site-header__row">
        <a class="site-header__title" href="#/">Corea 2026</a>
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          aria-pressed="false"
          aria-label="Attiva tema scuro"
        ><span aria-hidden="true">🌙</span></button>
      </div>
      <p class="site-header__period">26 luglio – 13 agosto 2026</p>
      <p class="connection-status" id="connection-status" aria-live="polite" hidden></p>
    </div>
  </header>

  <div id="update-banner" class="update-banner" role="status" hidden>
    <p class="update-banner__text">È disponibile un aggiornamento dell'app.</p>
    <button type="button" id="update-banner__btn" class="update-banner__btn">Aggiorna</button>
  </div>

  <main id="main" class="main" tabindex="-1">
    <p class="loading" id="loading">Caricamento itinerario…</p>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p>Sito statico — dati locali, nessun tracciamento.</p>
    <p id="last-updated" class="last-updated"></p>
    <button type="button" id="reset-completed" class="reset-completed">Azzera tappe completate</button>
  </footer>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
